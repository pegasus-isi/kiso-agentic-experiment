name: first-agentic-experiment

software:
  ollama:
    - labels:
        - ollama
      models:
        - gpt-oss:20b
      environment:
        OLLAMA_HOST: 0.0.0.0

sites:
  - kind: fabric
    rc_file: secrets/fabric_rc
    walltime: "02:00:00"
    site: UCSD
    image: default_rocky_9
    name_prefix: 2-agentt
    resources:
      machines:
        - labels:
            - ollama
            - agent
          flavour_desc:
            core: 4
            mem: 16
            disk: 30
          number: 1
        - labels:
            - agent-2
          flavour_desc:
            core: 2
            mem: 4
          number: 1
      networks:
        - labels:
            - network
          kind: FABNetv4
          site: UCSD
          nic:
            kind: SharedNIC
            model: ConnectX-6

experiments:
  - kind: shell
    name: agentic-experiment
    description: agentic-experiment
    scripts:
      - labels:
          - agent
          - agent-2
        script: |
          #!/bin/bash
          sudo dnf -y install python3.13 python3.13-pip python3.13-setuptools
          sudo pip3.13 install pydantic-ai
      - labels:
          - agent
        script: |
          #!/bin/bash
          echo "Running agent"
          python3.13 bin/agent.py > agent-output.txt
      - labels:
          - agent-2
        script: |
          #!/bin/bash
          echo "Running agent 2"
          python3.13 bin/agent-2.py > agent-2-output.txt
    outputs:
      - labels:
          - agent
        src: agent-output.txt
        dst: ./
      - labels:
          - agent-2
        src: agent-2-output.txt
        dst: ./
